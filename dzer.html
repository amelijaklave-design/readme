  <main>
    <p>Izvēlies dzērienu! Cena ir atkarīga no izvēlētā dzēriena.</p>
    <form>
      <input type="radio" id="teja" name="drink" value="1.90">
      <label for="teja">Tēja</label><br>
      <input type="radio" id="sula" name="drink" value="2.20">
      <label for="sula">Sula</label><br>
      <input type="radio" id="kakao" name="drink" value="3.00">
      <label for="kakao">Karstā šokolāde</label><br>
      <input type="radio" id="kafija" name="drink" value="3.20">
      <label for="kafija">Kafija</label>
      <br>
    <br>
      <div id="maksa-wrapper">
        <input type="button" id="poga" value="Jāmaksā!" onclick="maksa()">
        <span id="cena"></span>
      </div>
    </form>
    
    <script>
    function maksa() {
        let dz = document.getElementsByName('drink');
        let cenaSpan = document.getElementById("cena");
        for (let i = 0; i < dz.length; i++) {
            if (dz[i].checked) {
                cenaSpan.textContent = dz[i].value + " €";
                return;
            }
        }
        cenaSpan.textContent = ""; // ja nav izvēlēts
    }
    </script>
    
    </main>
