    <script>
    function maksa(){
      let dz = document.getElementsByTagName('input');
        let sum=0;
        for(i = 0; i < dz.length-1; i++) {
           if(dz[i].checked) sum+=Number(dz[i].value);
        }
        document.getElementById("maksa").innerHTML="Jāmaksā "+sum;
     }   
    </script>
    <p id="maksa">Izvēlies dzērienu/us! Cena ir atkarīga no izvēlētā dzēriena/iem.</p>
    <form>
      <input type="checkbox" id="teja"  name="teja" value="1.90">
      <label for="teja">Tēja</label><br>
      <input type="checkbox" id="sula"  name="sula" value="2.20">
      <label for="sula">Sula</label><br>
      <input type="checkbox" id="kakao"  name="kakao" value="3.00">
      <label for="kakao">Karstā šokolāde</label><br>
      <input type="checkbox" id="kafija"  name="kafija" value="3.20">
      <label for="kafija">Kafija</label><br>
<br>
    <input type="button" id="poga" value="Jāmaksā!" onclick="maksa()">
    </form>
